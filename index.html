<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Roblox Invite 🎮</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  touch-action: none;
}

body {
  background: #ff79b0;
  font-family: 'Segoe UI', Arial, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: bgShift 5s ease-in-out infinite alternate;
}

@keyframes bgShift {
  0%   { background-color: #ff79b0; }
  50%  { background-color: #ff4da6; }
  100% { background-color: #ff99cc; }
}

/* Sparks */
#sparks {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.spark {
  position: absolute;
  border-radius: 50%;
  animation: rise linear infinite;
}
@keyframes rise {
  0%   { transform: translateY(0) scale(0.2); opacity: 0; }
  15%  { opacity: 1; }
  80%  { opacity: 0.6; }
  100% { transform: translateY(-110px) scale(0.1); opacity: 0; }
}

/* Card */
.card {
  position: relative;
  z-index: 10;
  background: rgba(255,255,255,0.93);
  border-radius: 28px;
  padding: 36px 28px 32px;
  text-align: center;
  box-shadow: 0 10px 50px rgba(200,0,100,0.35), 0 0 0 4px rgba(255,110,180,0.5);
  width: 88vw;
  max-width: 360px;
  animation: popIn 0.65s cubic-bezier(0.34,1.56,0.64,1) both;
}

@keyframes popIn {
  from { transform: scale(0.4) rotate(-8deg); opacity: 0; }
  to   { transform: scale(1) rotate(0deg); opacity: 1; }
}

.icon {
  font-size: 52px;
  display: block;
  margin-bottom: 8px;
  animation: jump 1.3s ease-in-out infinite;
}
@keyframes jump {
  0%,100% { transform: translateY(0); }
  45%     { transform: translateY(-12px); }
  60%     { transform: translateY(-6px); }
}

h1 {
  font-size: 1.35rem;
  font-weight: 900;
  color: #d6006a;
  line-height: 1.4;
  margin-bottom: 6px;
}

.sub {
  font-size: 0.88rem;
  color: #b05580;
  font-weight: 700;
  margin-bottom: 26px;
}

/* Buttons — both inline initially */
.btn-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
}

.btn-yes {
  background: linear-gradient(135deg, #ff1a7a, #ff6eb4);
  color: #fff;
  border: none;
  border-radius: 50px;
  padding: 13px 32px;
  font-size: 1.05rem;
  font-weight: 800;
  cursor: pointer;
  box-shadow: 0 5px 18px rgba(255,26,122,0.45);
  transition: transform 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.btn-yes:active { transform: scale(0.94); }

/* NO button */
#noBtn {
  background: #fff;
  color: #e0006e;
  border: 2.5px solid #ff6eb4;
  border-radius: 50px;
  padding: 13px 26px;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  box-shadow: 0 4px 12px rgba(255,110,180,0.2);
  -webkit-tap-highlight-color: transparent;
  /* when flying */
  transition: background 0.1s, transform 0.12s;
}
#noBtn:active { transform: scale(0.94); }

#noBtn.flying {
  position: fixed;
  z-index: 999;
}

#noBtn.angry {
  position: fixed;
  z-index: 999;
  background: linear-gradient(135deg, #ff1a7a, #c7005c);
  color: #fff;
  border-color: transparent;
  font-size: 0.72rem;
  padding: 10px 14px;
  border-radius: 14px;
  box-shadow: 0 6px 22px rgba(199,0,92,0.5);
  animation: shakebtn 0.25s ease-in-out infinite;
  pointer-events: none;
  max-width: 85vw;
  white-space: normal;
  text-align: center;
  line-height: 1.3;
}
@keyframes shakebtn {
  0%,100% { transform: rotate(-3deg) scale(1.04); }
  50%     { transform: rotate(3deg)  scale(1.04); }
}

.info {
  margin-top: 12px;
  font-size: 0.78rem;
  color: #c4628a;
  font-weight: 700;
  min-height: 18px;
}

/* Yes message */
#yesMsg { display: none; }
#yesMsg.show {
  display: block;
  animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
}
.big-emoji {
  font-size: 2.8rem;
  display: block;
  margin-bottom: 8px;
  animation: jump 1s ease-in-out infinite;
}
#yesMsg h2 {
  font-size: 1.55rem;
  font-weight: 900;
  color: #d6006a;
  margin-bottom: 10px;
}
#yesMsg p {
  font-size: 0.92rem;
  color: #9a3060;
  font-weight: 600;
  line-height: 1.75;
}

/* Confetti */
.conf {
  position: fixed;
  top: -15px;
  z-index: 200;
  pointer-events: none;
  animation: fall linear forwards;
}
@keyframes fall {
  0%   { opacity: 1; transform: translateY(0) rotate(0deg); }
  100% { opacity: 0; transform: translateY(105vh) rotate(600deg); }
}
</style>
</head>
<body>

<div id="sparks"></div>

<div class="card" id="card">

  <div id="qSection">
    <span class="icon">&#127918;</span>
    <h1>Kya apko mere sath<br>Roblox khelna he? &#129394;</h1>
    <p class="sub">Please please please!! &#127800;&#10024;</p>
    <div class="btn-row" id="btnRow">
      <button class="btn-yes" onclick="onYes()">Yes! &#127881;</button>
      <button id="noBtn" onclick="onNo()">No &#128528;</button>
    </div>
    <p class="info" id="info"></p>
  </div>

  <div id="yesMsg">
    <span class="big-emoji">&#127882;&#128150;&#127918;</span>
    <h2>Thank you bbg!! &#128151;</h2>
    <p>
      Jaldi aao, apka wait<br>kar rha hoon!! &#129392;&#10024;<br>
      Roblox open karo abhi!! &#127918;&#127775;<br>
      So excited!! &#129321;&#128171;&#127882;
    </p>
  </div>

</div>

<script>
(function () {

  /* ── Sparks ── */
  var sc   = document.getElementById('sparks');
  var cols = ['#ff6eb4','#ff1a7a','#ffb3d9','#ffe066','#ffffff','#ffd6ec'];
  for (var i = 0; i < 40; i++) {
    var s  = document.createElement('div');
    s.className = 'spark';
    var sz = (Math.random() * 9 + 4).toFixed(1);
    s.style.cssText =
      'width:'  + sz + 'px;height:' + sz + 'px;' +
      'left:'   + (Math.random()*100).toFixed(1) + '%;' +
      'top:'    + (Math.random()*100).toFixed(1) + '%;' +
      'background:' + cols[Math.floor(Math.random()*cols.length)] + ';' +
      'box-shadow:0 0 5px 2px ' + cols[Math.floor(Math.random()*cols.length)] + ';' +
      'animation-duration:' + (Math.random()*3+2).toFixed(1) + 's;' +
      'animation-delay:'    + (Math.random()*4).toFixed(1)   + 's;';
    sc.appendChild(s);
  }

  /* ── State ── */
  var noClicks = 0;
  var isAngry  = false;
  var noBtn    = document.getElementById('noBtn');
  var info     = document.getElementById('info');

  /* ── No handler ── */
  window.onNo = function () {
    if (isAngry) return;
    noClicks++;

    /* First click: go fixed, stay at same visual position */
    if (noClicks === 1) {
      var r = noBtn.getBoundingClientRect();
      noBtn.classList.add('flying');
      noBtn.style.left = r.left + 'px';
      noBtn.style.top  = r.top  + 'px';
    }

    if (noClicks > 5) {
      noBtn.style.display = 'none';
      info.textContent    = 'Ab No gaya! Sirf YES dabao!! 💪';
      return;
    }

    if (noClicks === 3) {
      showAngry();
      return;
    }

    teleport();

    var hints = [
      '',
      'Itna easy nahi hoga 😏',
      'Pakad ke dekho! 🏃',
      'Zyada waqt mat lagao 😂'
    ];
    info.textContent = hints[Math.min(noClicks, hints.length - 1)];
  };

  /* ── Teleport — always inside screen ── */
  function teleport() {
    /* measure button AFTER it is fixed */
    var bw = noBtn.offsetWidth  || 110;
    var bh = noBtn.offsetHeight || 46;

    var pad  = 16; /* safe padding from edges */
    var maxX = window.innerWidth  - bw  - pad;
    var maxY = window.innerHeight - bh  - pad;

    /* clamp so it never goes off-screen */
    var x = Math.max(pad, Math.random() * maxX);
    var y = Math.max(pad, Math.random() * maxY);

    noBtn.style.left      = x + 'px';
    noBtn.style.top       = y + 'px';
    noBtn.style.transform = 'scale(1.3)';
    setTimeout(function () { noBtn.style.transform = 'scale(1)'; }, 150);
  }

  /* ── Angry state ── */
  function showAngry() {
    isAngry = true;
    noBtn.classList.remove('flying');
    noBtn.classList.add('angry');
    noBtn.textContent = 'Apki Pitti Ho jayegi ab jaldi yes dabao 😾';

    /* center on screen, clamped */
    var bw   = Math.min(noBtn.offsetWidth  || 240, window.innerWidth  * 0.85);
    var bh   = noBtn.offsetHeight || 50;
    var cx   = Math.max(8, (window.innerWidth  - bw) / 2);
    var cy   = Math.max(8, Math.min((window.innerHeight / 2) + 40, window.innerHeight - bh - 8));
    noBtn.style.left  = cx + 'px';
    noBtn.style.top   = cy + 'px';
    info.textContent  = '⚠️ 5 sec mein button wapas aayega...';

    setTimeout(function () {
      noBtn.classList.remove('angry');
      noBtn.classList.add('flying');
      noBtn.textContent = 'No 😐';
      isAngry           = false;
      info.textContent  = 'Zyada time mat lagao... 😤';
      teleport();
    }, 5000);
  }

  /* ── Yes ── */
  window.onYes = function () {
    document.getElementById('qSection').style.display = 'none';
    noBtn.style.display = 'none';
    document.getElementById('yesMsg').classList.add('show');
    doConfetti();
    moreSparks();
  };

  function doConfetti() {
    var cc = ['#ff1a7a','#ffb3d9','#ffe066','#ff6eb4','#fff','#c7005c'];
    for (var i = 0; i < 80; i++) {
      (function () {
        var el = document.createElement('div');
        el.className = 'conf';
        el.style.cssText =
          'left:'   + (Math.random()*100).toFixed(1) + 'vw;' +
          'width:'  + (Math.random()*10+5).toFixed(0) + 'px;' +
          'height:' + (Math.random()*10+5).toFixed(0) + 'px;' +
          'background:' + cc[Math.floor(Math.random()*cc.length)] + ';' +
          'border-radius:' + (Math.random()>0.5?'50%':'3px') + ';' +
          'animation-duration:' + (Math.random()*2+2).toFixed(1) + 's;' +
          'animation-delay:'    + (Math.random()*1.5).toFixed(1) + 's;';
        document.body.appendChild(el);
        setTimeout(function () { if (el.parentNode) el.parentNode.removeChild(el); }, 5000);
      })();
    }
  }

  function moreSparks() {
    var mc = ['#ff6eb4','#ff1a7a','#ffe066','#fff','#ffb3d9'];
    for (var i = 0; i < 50; i++) {
      var s  = document.createElement('div');
      s.className = 'spark';
      var sz = (Math.random()*12+5).toFixed(1);
      s.style.cssText =
        'width:'  + sz + 'px;height:' + sz + 'px;' +
        'left:'   + (Math.random()*100).toFixed(1) + '%;' +
        'top:'    + (Math.random()*100).toFixed(1) + '%;' +
        'background:' + mc[Math.floor(Math.random()*mc.length)] + ';' +
        'box-shadow:0 0 8px 4px ' + mc[Math.floor(Math.random()*mc.length)] + ';' +
        'animation-duration:' + (Math.random()*2+1).toFixed(1) + 's;' +
        'animation-delay:0s;';
      sc.appendChild(s);
    }
  }

})();
</script>
</body>
</html>
