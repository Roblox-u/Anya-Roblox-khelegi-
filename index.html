<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roblox Invite 🎮</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  width: 100vw;
  background: #ff79b0;
  font-family: 'Segoe UI', 'Arial Rounded MT Bold', Arial, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
  animation: bgShift 5s ease-in-out infinite alternate;
}

@keyframes bgShift {
  0%   { background-color: #ff79b0; }
  33%  { background-color: #ff4da6; }
  66%  { background-color: #ff99cc; }
  100% { background-color: #ff6eb4; }
}

#sparks {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

.spark {
  position: absolute;
  border-radius: 50%;
  animation: rise linear infinite;
}

@keyframes rise {
  0%   { transform: translateY(0) scale(0.2); opacity: 0; }
  15%  { opacity: 1; }
  80%  { opacity: 0.7; }
  100% { transform: translateY(-130px) scale(0.1); opacity: 0; }
}

.card {
  position: relative;
  z-index: 10;
  background: rgba(255,255,255,0.93);
  border-radius: 30px;
  padding: 45px 50px 40px;
  text-align: center;
  box-shadow: 0 10px 50px rgba(200,0,100,0.35), 0 0 0 4px rgba(255,110,180,0.5);
  max-width: 460px;
  width: 88vw;
  animation: popIn 0.65s cubic-bezier(0.34,1.56,0.64,1) both;
}

@keyframes popIn {
  from { transform: scale(0.4) rotate(-8deg); opacity: 0; }
  to   { transform: scale(1)   rotate(0deg);  opacity: 1; }
}

.icon {
  font-size: 62px;
  display: block;
  margin-bottom: 10px;
  animation: jump 1.3s ease-in-out infinite;
}

@keyframes jump {
  0%,100% { transform: translateY(0); }
  45%     { transform: translateY(-14px); }
  60%     { transform: translateY(-8px); }
}

h1 {
  font-size: 1.65rem;
  font-weight: 900;
  color: #d6006a;
  line-height: 1.35;
  margin-bottom: 8px;
}

.sub {
  font-size: 0.98rem;
  color: #b05580;
  font-weight: 700;
  margin-bottom: 32px;
}

.btn-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 18px;
  min-height: 60px;
}

.btn-yes {
  background: linear-gradient(135deg,#ff1a7a,#ff6eb4);
  color: #fff;
  border: none;
  border-radius: 50px;
  padding: 13px 38px;
  font-size: 1.15rem;
  font-weight: 800;
  cursor: pointer;
  box-shadow: 0 5px 18px rgba(255,26,122,0.45);
  transition: transform 0.15s, box-shadow 0.15s;
}
.btn-yes:hover  { transform: scale(1.08) translateY(-2px); }
.btn-yes:active { transform: scale(0.96); }

#noBtn {
  background: #fff;
  color: #e0006e;
  border: 2.5px solid #ff6eb4;
  border-radius: 50px;
  padding: 13px 30px;
  font-size: 1.05rem;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  box-shadow: 0 4px 12px rgba(255,110,180,0.2);
  transition: background 0.15s, transform 0.15s;
}
#noBtn:hover { background: #ffe6f3; }

#noBtn.flying {
  position: fixed;
  z-index: 999;
  transition: background 0.15s, transform 0.15s;
}

#noBtn.angry {
  position: fixed;
  z-index: 999;
  background: linear-gradient(135deg,#ff1a7a,#c7005c);
  color: #fff;
  border-color: transparent;
  font-size: 0.8rem;
  padding: 11px 16px;
  border-radius: 14px;
  box-shadow: 0 6px 22px rgba(199,0,92,0.5);
  animation: shake 0.25s ease-in-out infinite;
  pointer-events: none;
  cursor: default;
}

@keyframes shake {
  0%,100% { transform: rotate(-3deg) scale(1.05); }
  50%     { transform: rotate(3deg)  scale(1.05); }
}

.info {
  margin-top: 14px;
  font-size: 0.82rem;
  color: #c4628a;
  font-weight: 700;
  min-height: 20px;
}

#yesMsg { display: none; }
#yesMsg.show {
  display: block;
  animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
}

.big-emoji {
  font-size: 3rem;
  display: block;
  margin-bottom: 8px;
  animation: jump 1s ease-in-out infinite;
}

#yesMsg h2 {
  font-size: 1.75rem;
  font-weight: 900;
  color: #d6006a;
  margin-bottom: 12px;
}

#yesMsg p {
  font-size: 1rem;
  color: #9a3060;
  font-weight: 600;
  line-height: 1.7;
}

.conf {
  position: fixed;
  top: -15px;
  border-radius: 3px;
  z-index: 200;
  animation: fall linear forwards;
}

@keyframes fall {
  0%   { opacity: 1; transform: translateY(0)    rotate(0deg); }
  100% { opacity: 0; transform: translateY(105vh) rotate(600deg); }
}
</style>
</head>
<body>

<div id="sparks"></div>

<div class="card">
  <div id="qSection">
    <span class="icon">&#127918;</span>
    <h1>Kya apko mere sath<br>Roblox khelna he? &#129394;</h1>
    <p class="sub">Please please please!! &#127800;&#10024;</p>
    <div class="btn-row" id="btnRow">
      <button class="btn-yes" onclick="onYes()">Yes! &#127881;</button>
      <button id="noBtn" onclick="onNo()">No &#128528;</button>
    </div>
    <p class="info" id="info"></p>
  </div>

  <div id="yesMsg">
    <span class="big-emoji">&#127882;&#128150;&#127918;</span>
    <h2>Thank you bbg!! &#128151;</h2>
    <p>
      Jaldi aao, apka wait kar rha hoon!! &#129392;&#10024;<br>
      Roblox open karo abhi!! &#127918;&#127775;<br>
      So excited!! &#129321;&#128171;&#127882;
    </p>
  </div>
</div>

<script>
(function() {
  // Sparks
  var sc = document.getElementById('sparks');
  var cols = ['#ff6eb4','#ff1a7a','#ffb3d9','#ffe066','#ffffff','#ffd6ec','#ff99cc'];
  for (var i = 0; i < 45; i++) {
    var s = document.createElement('div');
    s.className = 'spark';
    var sz = (Math.random() * 10 + 4).toFixed(1);
    s.style.cssText =
      'width:' + sz + 'px;' +
      'height:' + sz + 'px;' +
      'left:' + (Math.random()*100).toFixed(1) + '%;' +
      'top:' + (Math.random()*100).toFixed(1) + '%;' +
      'background:' + cols[Math.floor(Math.random()*cols.length)] + ';' +
      'box-shadow:0 0 6px 3px ' + cols[Math.floor(Math.random()*cols.length)] + ';' +
      'animation-duration:' + (Math.random()*3+2).toFixed(1) + 's;' +
      'animation-delay:' + (Math.random()*4).toFixed(1) + 's;';
    sc.appendChild(s);
  }

  var noClicks = 0;
  var isAngry  = false;
  var noBtn    = document.getElementById('noBtn');
  var info     = document.getElementById('info');

  window.onNo = function() {
    if (isAngry) return;
    noClicks++;

    if (noClicks === 1) {
      var r = noBtn.getBoundingClientRect();
      noBtn.classList.add('flying');
      noBtn.style.left = r.left + 'px';
      noBtn.style.top  = r.top  + 'px';
    }

    if (noClicks > 5) {
      noBtn.style.display = 'none';
      info.textContent = 'Ab No button gaya! Sirf YES dabao!! 💪';
      return;
    }

    if (noClicks === 3) {
      showAngry();
      return;
    }

    teleport();

    var hints = [
      '',
      'Itna easy nahi hoga... 😏',
      'Pakad ke dekho! 🏃',
      'Zyada time mat lagao! 😂'
    ];
    info.textContent = hints[Math.min(noClicks, hints.length - 1)];
  };

  function teleport() {
    var pad = 70;
    var bw  = noBtn.offsetWidth  || 110;
    var bh  = noBtn.offsetHeight || 46;
    var maxX = window.innerWidth  - bw  - pad;
    var maxY = window.innerHeight - bh  - pad;
    var x = Math.random() * (maxX - pad) + pad;
    var y = Math.random() * (maxY - pad) + pad;
    noBtn.style.left = x + 'px';
    noBtn.style.top  = y + 'px';
    noBtn.style.transform = 'scale(1.35)';
    setTimeout(function() { noBtn.style.transform = 'scale(1)'; }, 160);
  }

  function showAngry() {
    isAngry = true;
    noBtn.classList.remove('flying');
    noBtn.classList.add('angry');
    noBtn.textContent = 'Apki Pitti Ho jayegi ab jaldi yes dabao 😾';
    noBtn.style.left = Math.max(10, (window.innerWidth/2 - 170)) + 'px';
    noBtn.style.top  = (window.innerHeight/2 + 50) + 'px';
    info.textContent = '⚠️ 5 second mein button wapas aayega...';

    setTimeout(function() {
      noBtn.classList.remove('angry');
      noBtn.classList.add('flying');
      noBtn.textContent = 'No 😐';
      isAngry = false;
      info.textContent = 'Zyada time mat lagao...';
      teleport();
    }, 5000);
  }

  window.onYes = function() {
    document.getElementById('qSection').style.display = 'none';
    noBtn.style.display = 'none';
    document.getElementById('yesMsg').classList.add('show');
    doConfetti();
    moreSparks();
  };

  function doConfetti() {
    var cc = ['#ff1a7a','#ffb3d9','#ffe066','#ff6eb4','#ffffff','#c7005c','#ffd6ec'];
    for (var i = 0; i < 90; i++) {
      (function() {
        var el = document.createElement('div');
        el.className = 'conf';
        el.style.cssText =
          'left:' + (Math.random()*100).toFixed(1) + 'vw;' +
          'width:' + (Math.random()*10+5).toFixed(0) + 'px;' +
          'height:' + (Math.random()*10+5).toFixed(0) + 'px;' +
          'background:' + cc[Math.floor(Math.random()*cc.length)] + ';' +
          'border-radius:' + (Math.random()>0.5?'50%':'3px') + ';' +
          'animation-duration:' + (Math.random()*2+2).toFixed(1) + 's;' +
          'animation-delay:' + (Math.random()*1.5).toFixed(1) + 's;';
        document.body.appendChild(el);
        setTimeout(function() { if(el.parentNode) el.parentNode.removeChild(el); }, 5000);
      })();
    }
  }

  function moreSparks() {
    var mc = ['#ff6eb4','#ff1a7a','#ffe066','#fff','#ffb3d9'];
    for (var i = 0; i < 55; i++) {
      var s = document.createElement('div');
      s.className = 'spark';
      var sz = (Math.random()*14+5).toFixed(1);
      s.style.cssText =
        'width:' + sz + 'px;height:' + sz + 'px;' +
        'left:' + (Math.random()*100).toFixed(1) + '%;' +
        'top:' + (Math.random()*100).toFixed(1) + '%;' +
        'background:' + mc[Math.floor(Math.random()*mc.length)] + ';' +
        'box-shadow:0 0 8px 4px ' + mc[Math.floor(Math.random()*mc.length)] + ';' +
        'animation-duration:' + (Math.random()*2+1).toFixed(1) + 's;' +
        'animation-delay:0s;';
      sc.appendChild(s);
    }
  }
})();
</script>
</body>
</html>
